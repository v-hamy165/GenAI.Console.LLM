name: CI - .NET Build & Tests

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        cache: false

    - name: Restore
      run: dotnet restore DemoUnitTest_ConsoleApp.slnx

    - name: Build
      run: dotnet build DemoUnitTest_ConsoleApp.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test UnitTest/UnitTest.csproj --configuration Release --no-build